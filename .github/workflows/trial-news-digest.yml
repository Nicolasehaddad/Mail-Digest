name: Trial News Digest

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/trial-news-digest.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-trial-news-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Send trial news digest
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: 'nicolasehaddad@gmail.com'
          EMAIL_TO: 'nicolasehaddad@gmail.com, eliashaddad222@gmail.com'
        run: |
          python - <<'PY'
          import csv, email.utils, html, json, os, re, smtplib, urllib.parse, urllib.request, xml.etree.ElementTree as ET
          from datetime import datetime, timedelta, timezone
          from email.message import EmailMessage
          from io import StringIO
          from zoneinfo import ZoneInfo

          TZ = ZoneInfo('Asia/Beirut')
          NOW = datetime.now(TZ)
          UA = 'Mozilla/5.0 trial-news-digest'
          RECIPIENTS = [x.strip() for x in os.environ['EMAIL_TO'].split(',') if x.strip()]

          def fetch(url, timeout=18):
              req = urllib.request.Request(url, headers={'User-Agent': UA})
              with urllib.request.urlopen(req, timeout=timeout) as r:
                  return r.read()

          def clean(value, limit=180):
              value = html.unescape(re.sub(r'<[^>]+>', ' ', value or ''))
              value = re.sub(r'\s+', ' ', value).strip()
              return value if len(value) <= limit else value[:limit - 3].rstrip() + '...'

          def yahoo(symbol):
              try:
                  url = 'https://query1.finance.yahoo.com/v8/finance/chart/' + urllib.parse.quote(symbol) + '?range=2d&interval=5m'
                  result = json.loads(fetch(url).decode())['chart']['result'][0]
                  closes = [x for x in result['indicators']['quote'][0]['close'] if isinstance(x, (int, float))]
                  price = closes[-1]
                  prev = next((x for x in reversed(closes[:-1]) if x), price)
                  return {'price': price, 'change': price - prev}
              except Exception as e:
                  print('market fetch failed', symbol, e)
                  return None

          markets = {
              'XAUUSD proxy': yahoo('GC=F'),
              'USD/DXY': yahoo('DX-Y.NYB'),
              'US 10Y': yahoo('^TNX'),
              'WTI oil': yahoo('CL=F'),
          }

          feeds = [
              ('Fed', 'https://www.federalreserve.gov/feeds/press_monetary.xml'),
              ('Fed speeches', 'https://www.federalreserve.gov/feeds/speeches.xml'),
              ('BBC business', 'https://feeds.bbci.co.uk/news/business/rss.xml'),
              ('BBC world', 'https://feeds.bbci.co.uk/news/world/rss.xml'),
              ('Al Jazeera', 'https://www.aljazeera.com/xml/rss/all.xml'),
              ('EIA', 'https://www.eia.gov/rss/todayinenergy.xml'),
          ]
          keywords = re.compile(r'gold|xau|dollar|fed|fomc|powell|yield|inflation|cpi|pce|payroll|oil|brent|wti|opec|iran|israel|lebanon|red sea|middle east|tariff|sanction|jobs|treasury', re.I)
          since = datetime.now(timezone.utc) - timedelta(hours=30)
          items = []
          seen = set()
          for source, url in feeds:
              try:
                  root = ET.fromstring(fetch(url))
                  for item in root.findall('.//item')[:14]:
                      title = clean(item.findtext('title'), 140)
                      desc = clean(item.findtext('description'), 180)
                      if not title or title.lower() in seen:
                          continue
                      blob = title + ' ' + desc
                      pub = item.findtext('pubDate') or ''
                      fresh = True
                      try:
                          dt = email.utils.parsedate_to_datetime(pub).astimezone(timezone.utc)
                          fresh = dt >= since
                      except Exception:
                          dt = None
                      if not fresh and not keywords.search(blob):
                          continue
                      score = 0
                      score += 4 if keywords.search(blob) else 0
                      score += sum(1 for w in ('fed', 'yield', 'inflation', 'oil', 'iran', 'israel', 'gold', 'dollar', 'jobs') if w in blob.lower())
                      items.append({'source': source, 'title': title, 'desc': desc, 'score': score, 'fresh': fresh})
                      seen.add(title.lower())
              except Exception as e:
                  print('rss failed', source, e)
          items.sort(key=lambda x: (x['score'], x['fresh']), reverse=True)
          top = items[:5]

          dxy = markets.get('USD/DXY') or {'change': 0}
          ten = markets.get('US 10Y') or {'change': 0}
          oil = markets.get('WTI oil') or {'change': 0}
          support = (1 if dxy['change'] < 0 else -1) + (1 if ten['change'] < 0 else -1) + (1 if oil['change'] > 0 else 0)
          if support >= 2:
              bias = 'XAUUSD supportive'
              reason = 'USD/yield pressure is lighter or energy/geopolitical risk is firmer.'
          elif support <= -2:
              bias = 'XAUUSD negative'
              reason = 'USD/yield pressure is firmer, which usually weighs on gold.'
          else:
              bias = 'XAUUSD mixed'
              reason = 'The main drivers are split, so the signal is not clean.'
          invalidation = 'Invalidation: this read changes if DXY and US yields move together in the opposite direction, or a major Fed/data headline reprices rate expectations.'

          def market_row(name, v):
              if not v:
                  return f'<tr><td>{html.escape(name)}</td><td>Unavailable</td><td></td></tr>'
              unit = '%' if 'yield' in name.lower() or name == 'US 10Y' else ''
              color = '#12805c' if v['change'] >= 0 else '#b42318'
              return f'<tr><td>{html.escape(name)}</td><td><b>{v["price"]:.2f}{unit}</b></td><td style="color:{color}">{v["change"]:+.2f}{unit}</td></tr>'

          news_html = ''.join(f'<li><b>{html.escape(x["source"])}</b>: {html.escape(x["title"])}</li>' for x in top) or '<li>No major matching headline found in the free feeds right now.</li>'
          plain_news = '\n'.join(f'- {x["source"]}: {x["title"]}' for x in top) or '- No major matching headline found in the free feeds right now.'
          market_rows = ''.join(market_row(k, v) for k, v in markets.items())
          plain_markets = '\n'.join(f'- {k}: {v["price"]:.2f} ({v["change"]:+.2f})' for k, v in markets.items() if v)

          plain = f'''Trial News Digest - {NOW:%Y-%m-%d %H:%M} Asia/Beirut

Bias: {bias}. {reason}

Market snapshot:
{plain_markets}

What matters now:
{plain_news}

{invalidation}
'''
          body = f'''<!doctype html><html><body style="margin:0;background:#f6f7f9;font-family:Arial,sans-serif;color:#202124">
          <div style="max-width:720px;margin:0 auto;padding:20px">
          <h2 style="margin:0 0 4px">Trial News Digest</h2>
          <div style="color:#5f6368;margin-bottom:14px">{NOW:%Y-%m-%d %H:%M} Asia/Beirut</div>
          <div style="background:#fff;border:1px solid #dadce0;border-radius:8px;padding:14px;margin-bottom:12px"><b>{bias}</b><br>{reason}<br><br>{invalidation}</div>
          <div style="background:#fff;border:1px solid #dadce0;border-radius:8px;padding:14px;margin-bottom:12px"><b>Market snapshot</b><table style="width:100%;border-collapse:collapse;margin-top:8px"><tr style="color:#5f6368;text-align:left"><th>Driver</th><th>Now</th><th>Last move</th></tr>{market_rows}</table></div>
          <div style="background:#fff;border:1px solid #dadce0;border-radius:8px;padding:14px"><b>What matters now</b><ul>{news_html}</ul></div>
          </div></body></html>'''

          msg = EmailMessage()
          msg['Subject'] = f'Trial News Digest - {NOW:%Y-%m-%d %H:%M} Asia/Beirut'
          msg['From'] = os.environ['SMTP_FROM']
          msg['To'] = ', '.join(RECIPIENTS)
          msg.set_content(plain)
          msg.add_alternative(body, subtype='html')
          with smtplib.SMTP(os.environ['SMTP_HOST'], int(os.environ['SMTP_PORT'])) as smtp:
              smtp.starttls()
              smtp.login(os.environ['SMTP_USERNAME'], os.environ['SMTP_PASSWORD'])
              smtp.send_message(msg)
          print(f'Sent trial digest to {len(RECIPIENTS)} recipient(s): {", ".join(RECIPIENTS)}')
          PY
