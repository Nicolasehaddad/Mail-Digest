name: Market Intelligence Digest

on:
  workflow_dispatch:
  schedule:
    # GitHub cron is UTC. These paired UTC hours cover Beirut UTC+2 and UTC+3.
    - cron: "0 5,6,10,11,20,21 * * *"

permissions:
  contents: write

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check Beirut send window
        id: beirut_time
        run: |
          local_hour="$(TZ=Asia/Beirut date +'%H')"
          local_time="$(TZ=Asia/Beirut date +'%Y-%m-%d %H:%M')"
          echo "local_time=$local_time" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "send=true" >> "$GITHUB_OUTPUT"
          elif [ "$local_hour" = "08" ] || [ "$local_hour" = "13" ] || [ "$local_hour" = "23" ]; then
            echo "send=true" >> "$GITHUB_OUTPUT"
          else
            echo "send=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: $local_time Asia/Beirut is not a send window."
          fi

      - name: Build and send market intelligence brief
        if: steps.beirut_time.outputs.send == 'true'
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          EMAIL_TO: nicolasehaddad@gmail.com
        run: |
          python - <<'PY'
          import email.utils
          import csv
          import html
          import json
          import os
          import re
          import smtplib
          import time
          import urllib.parse
          import urllib.request
          import xml.etree.ElementTree as ET
          from datetime import datetime, timedelta, timezone
          from email.message import EmailMessage
          from io import StringIO
          from pathlib import Path
          from zoneinfo import ZoneInfo

          TZ_NAME = "Asia/Beirut"
          TZ = ZoneInfo(TZ_NAME)
          NOW = datetime.now(TZ)
          SINCE = NOW.astimezone(timezone.utc) - timedelta(hours=24)
          STATE_PATH = Path(".digest-state/latest.json")
          BROWSER_USER_AGENT = (
              "Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
              "AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"
          )
          FRED_USER_AGENT = "Mozilla/5.0"

          RSS_SOURCES = [
              {
                  "id": "fed_monetary",
                  "name": "Federal Reserve",
                  "url": "https://www.federalreserve.gov/feeds/press_monetary.xml",
                  "tier": "official",
                  "tags": ["usd", "rates", "xauusd"],
              },
              {
                  "id": "fed_speeches",
                  "name": "Federal Reserve Speeches",
                  "url": "https://www.federalreserve.gov/feeds/speeches.xml",
                  "tier": "official",
                  "tags": ["usd", "rates", "xauusd"],
              },
              {
                  "id": "ecb_press",
                  "name": "ECB",
                  "url": "https://www.ecb.europa.eu/rss/press.html",
                  "tier": "official",
                  "tags": ["eur", "rates", "usd"],
              },
              {
                  "id": "bbc_business",
                  "name": "BBC Business",
                  "url": "https://feeds.bbci.co.uk/news/business/rss.xml",
                  "tier": "public",
                  "tags": [],
              },
              {
                  "id": "bbc_world",
                  "name": "BBC World",
                  "url": "https://feeds.bbci.co.uk/news/world/rss.xml",
                  "tier": "public",
                  "tags": [],
              },
              {
                  "id": "aljazeera",
                  "name": "Al Jazeera",
                  "url": "https://www.aljazeera.com/xml/rss/all.xml",
                  "tier": "news",
                  "tags": [],
              },
              {
                  "id": "eia_energy",
                  "name": "EIA",
                  "url": "https://www.eia.gov/rss/todayinenergy.xml",
                  "tier": "official",
                  "tags": ["oil", "energy", "inflation"],
              },
          ]

          GDELT_QUERIES = [
              ("gold_macro", '(gold OR XAUUSD OR "central bank gold" OR "gold ETF" OR "real yields")'),
              ("fed_usd_rates", '(Federal Reserve OR FOMC OR Powell OR "Treasury yields" OR CPI OR PCE OR payrolls)'),
              ("oil_geopolitics", '(Brent OR WTI OR oil OR OPEC OR "Strait of Hormuz" OR "Red Sea" OR tanker OR refinery)'),
              ("middle_east_risk", '("Middle East" OR Iran OR Israel OR Lebanon OR Syria OR Gaza OR Qatar OR Saudi OR "Red Sea")'),
          ]

          MARKET_SYMBOLS = [
              {"id": "gold", "label": "XAUUSD proxy", "symbol": "GC=F", "unit": "$"},
              {"id": "dxy", "label": "US Dollar Index", "symbol": "DX-Y.NYB", "unit": ""},
              {"id": "us10y", "label": "US 10Y yield", "symbol": "^TNX", "unit": "%"},
              {"id": "wti", "label": "WTI crude", "symbol": "CL=F", "unit": "$"},
          ]

          FRED_CSV_SERIES = [
              {"id": "real10y", "label": "US 10Y real yield", "series": "DFII10", "unit": "%"},
              {"id": "breakeven10y", "label": "US 10Y breakeven", "series": "T10YIE", "unit": "%"},
          ]

          CALENDAR_IMPORTANCE = {
              "Consumer Price Index": "High",
              "Employment Situation": "High",
              "Personal Income and the PCE Deflator": "High",
              "FOMC": "High",
              "Federal Funds": "High",
              "Powell": "High",
              "Gross Domestic Product": "Medium",
              "Producer Price Index": "Medium",
              "Initial Claims": "Medium",
              "JOLTS": "Medium",
              "Retail Sales": "Medium",
              "Durable Goods": "Medium",
              "Consumer Confidence": "Medium",
              "ADP": "Medium",
              "ISM Manufacturing": "Medium",
              "ISM Non-Manufacturing": "Medium",
              "Michigan Consumer Survey": "Medium",
          }

          TAG_RULES = [
              (("gold", "xau", "bullion"), ["xauusd", "gold"], ["gold"]),
              (("fed", "fomc", "powell", "treasury", "yield", "real yield"), ["usd", "rates", "xauusd"], ["rates"]),
              (("cpi", "pce", "inflation", "payroll"), ["usd", "rates", "xauusd"], ["inflation"]),
              (("oil", "brent", "wti", "opec", "hormuz", "red sea", "tanker"), ["oil", "inflation"], ["energy"]),
              (("sanction", "ofac", "export controls"), ["sanctions", "oil", "usd", "xauusd"], ["sanctions"]),
              (("iran", "israel", "lebanon", "gaza", "middle east", "missile", "ceasefire", "hormuz", "red sea"), ["geopolitics", "risk", "xauusd", "oil"], ["geopolitics"]),
              (("china", "yuan", "renminbi", "pboc", "property"), ["china", "aud", "copper", "risk", "fx"], ["china_macro"]),
          ]

          HIGH_IMPACT = {
              "fed", "fomc", "powell", "cpi", "pce", "payrolls", "inflation", "treasury",
              "yield", "real yield", "sanction", "opec", "brent", "wti", "hormuz",
              "red sea", "missile", "ceasefire", "china", "yuan", "gold", "central bank",
          }

          def fetch(url, timeout=20):
              req = urllib.request.Request(url, headers={"User-Agent": BROWSER_USER_AGENT})
              with urllib.request.urlopen(req, timeout=timeout) as response:
                  return response.read()

          def fetch_market_symbol(symbol):
              url = "https://query1.finance.yahoo.com/v8/finance/chart/" + urllib.parse.quote(symbol, safe="") + "?range=5d&interval=1d"
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": BROWSER_USER_AGENT})
                  parsed = json.loads(urllib.request.urlopen(req, timeout=15).read().decode("utf-8", errors="replace"))
                  result = parsed["chart"]["result"][0]
                  closes = [value for value in result["indicators"]["quote"][0].get("close", []) if value is not None]
                  if not closes:
                      return None
                  latest = float(result.get("meta", {}).get("regularMarketPrice") or closes[-1])
                  previous = float(closes[-2]) if len(closes) >= 2 else latest
                  change = latest - previous
                  pct = (change / previous * 100) if previous else 0
                  return {"value": latest, "previous": previous, "change": change, "pct": pct}
              except Exception as exc:
                  print(f"Market snapshot skipped for {symbol}: {exc}")
                  return None

          def fetch_market_snapshot():
              rows = []
              for config in MARKET_SYMBOLS:
                  row = dict(config)
                  data = fetch_market_symbol(config["symbol"])
                  if data:
                      row.update(data)
                      row["available"] = True
                  else:
                      row["available"] = False
                  rows.append(row)
              return rows

          def fetch_fred_csv_series(series):
              url = "https://fred.stlouisfed.org/graph/fredgraph.csv?id=" + urllib.parse.quote(series)
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": FRED_USER_AGENT})
                  text = urllib.request.urlopen(req, timeout=20).read().decode("utf-8", errors="replace")
                  rows = []
                  for row in csv.DictReader(StringIO(text)):
                      value = (row.get(series) or "").strip()
                      if value and value != ".":
                          rows.append((row.get("observation_date", ""), float(value)))
                  if not rows:
                      return None
                  latest_date, latest = rows[-1]
                  previous = rows[-2][1] if len(rows) >= 2 else latest
                  return {"date": latest_date, "value": latest, "previous": previous, "change": latest - previous}
              except Exception as exc:
                  print(f"FRED CSV skipped for {series}: {exc}")
                  return None

          def fetch_rate_snapshot():
              rows = []
              for config in FRED_CSV_SERIES:
                  row = dict(config)
                  data = fetch_fred_csv_series(config["series"])
                  if data:
                      row.update(data)
                      row["available"] = True
                  else:
                      row["available"] = False
                  rows.append(row)
              return rows

          def market_value(row):
              if not row.get("available"):
                  return "n/a"
              value = float(row["value"])
              if row.get("unit") == "$":
                  return f"${value:,.2f}"
              if row.get("unit") == "%":
                  return f"{value:.2f}%"
              return f"{value:,.2f}"

          def market_change(row):
              if not row.get("available"):
                  return "n/a"
              change = float(row["change"])
              pct = float(row["pct"])
              arrow = "up" if change > 0 else ("down" if change < 0 else "flat")
              return f"{arrow} {change:+.2f} ({pct:+.2f}%)"

          def rate_value(row):
              if not row.get("available"):
                  return "n/a"
              return f"{float(row['value']):.2f}%"

          def rate_change(row):
              if not row.get("available"):
                  return "n/a"
              change = float(row["change"])
              arrow = "up" if change > 0 else ("down" if change < 0 else "flat")
              return f"{arrow} {change:+.2f} pts"

          def parse_nyfed_calendar(horizon_hours=48):
              url = "https://www.newyorkfed.org/research/calendars/nationalecon_cal"
              try:
                  page = fetch(url, timeout=20).decode("utf-8", errors="replace")
              except Exception as exc:
                  print(f"NY Fed calendar skipped: {exc}")
                  return []
              month_match = re.search(r"([A-Za-z]+)\s+(\d{4})", re.sub(r"<[^>]+>", " ", page[88000:90000]))
              if not month_match:
                  return []
              month_name, year_text = month_match.groups()
              try:
                  month_number = datetime.strptime(month_name, "%B").month
                  year_number = int(year_text)
              except ValueError:
                  return []
              cells = re.findall(r'<td[^>]*class="somatd[^"]*"[^>]*>\s*<div>(.*?)</div>\s*</td>', page, re.S)
              events = []
              end = NOW + timedelta(hours=horizon_hours)
              eastern = timezone(timedelta(hours=-4), "US/Eastern")
              for cell in cells:
                  plain = html.unescape(re.sub(r"<[^>]+>", " ", cell))
                  day_match = re.match(r"\s*(\d{1,2})", plain)
                  if not day_match:
                      continue
                  day = int(day_match.group(1))
                  for event_match in re.finditer(r"([A-Za-z][A-Za-z0-9 /\-&().]+?)\s*\((\d{2}:\d{2})\)", plain):
                      name = clean(event_match.group(1), 90)
                      event_time = event_match.group(2)
                      try:
                          event_dt = datetime(year_number, month_number, day, int(event_time[:2]), int(event_time[3:]), tzinfo=eastern).astimezone(TZ)
                      except Exception:
                          continue
                      if NOW <= event_dt <= end:
                          importance = "Low"
                          for key, value in CALENDAR_IMPORTANCE.items():
                              if key.lower() in name.lower():
                                  importance = value
                                  break
                          events.append({"name": name, "time": event_dt.strftime("%Y-%m-%d %H:%M"), "importance": importance})
              return events[:8]

          def eia_calendar_events(horizon_hours=48):
              events = []
              end = NOW + timedelta(hours=horizon_hours)
              eastern = timezone(timedelta(hours=-4), "US/Eastern")
              for offset in range(4):
                  day = (NOW + timedelta(days=offset)).date()
                  if day.weekday() != 2:
                      continue
                  event_dt = datetime(day.year, day.month, day.day, 10, 30, tzinfo=eastern).astimezone(TZ)
                  if NOW <= event_dt <= end:
                      events.append({"name": "EIA Weekly Petroleum Status Report", "time": event_dt.strftime("%Y-%m-%d %H:%M"), "importance": "High"})
              return events

          def calendar_risks():
              events = parse_nyfed_calendar()
              events.extend(eia_calendar_events())
              seen, unique = set(), []
              for event in sorted(events, key=lambda item: item["time"]):
                  key = (event["time"], event["name"])
                  if key not in seen:
                      seen.add(key)
                      unique.append(event)
              priority_events = [event for event in unique if event.get("importance") in {"High", "Medium"}]
              return priority_events[:6]

          def clean(value, max_chars=260):
              value = value or ""
              value = re.sub(r"<[^>]+>", " ", value)
              value = html.unescape(value)
              value = value.translate(str.maketrans({
                  "\u2018": "'", "\u2019": "'", "\u201c": '"', "\u201d": '"',
                  "\u2013": "-", "\u2014": "-", "\u2026": "...", "\u00a0": " ",
              }))
              value = re.sub(r"\s+", " ", value).strip()
              if len(value) > max_chars:
                  value = value[:max_chars - 3].rstrip() + "..."
              return value

          def local_name(tag):
              return tag.rsplit("}", 1)[-1].lower()

          def child_text(node, name):
              wanted = name.lower()
              for child in list(node):
                  if local_name(child.tag) == wanted:
                      return (child.text or "").strip()
              return ""

          def child_attr(node, name, attr):
              wanted = name.lower()
              for child in list(node):
                  if local_name(child.tag) == wanted:
                      return child.attrib.get(attr, "").strip()
              return ""

          def parse_dt(value):
              if not value:
                  return None
              value = value.strip()
              for fmt in ("%Y%m%dT%H%M%SZ", "%Y-%m-%dT%H:%M:%SZ", "%Y-%m-%dT%H:%M:%S%z"):
                  try:
                      dt = datetime.strptime(value, fmt)
                      if dt.tzinfo is None:
                          dt = dt.replace(tzinfo=timezone.utc)
                      return dt.astimezone(timezone.utc)
                  except ValueError:
                      pass
              try:
                  dt = datetime.fromisoformat(value.replace("Z", "+00:00"))
                  if dt.tzinfo is None:
                      dt = dt.replace(tzinfo=timezone.utc)
                  return dt.astimezone(timezone.utc)
              except ValueError:
                  pass
              try:
                  dt = email.utils.parsedate_to_datetime(value)
                  if dt.tzinfo is None:
                      dt = dt.replace(tzinfo=timezone.utc)
                  return dt.astimezone(timezone.utc)
              except Exception:
                  return None

          def contains_term(text, term):
              term = term.lower()
              if re.fullmatch(r"[a-z0-9 ]+", term):
                  pattern = r"(?<![a-z0-9])" + r"\s+".join(re.escape(part) for part in term.split()) + r"(?![a-z0-9])"
                  return re.search(pattern, text) is not None
              return term in text

          def normalize(tags):
              result = []
              for tag in tags:
                  tag = str(tag).strip().lower().replace("-", "_").replace(" ", "_")
                  if tag and tag not in result:
                      result.append(tag)
              return result

          def infer_tags(title, summary):
              text = f"{title} {summary}".lower()
              assets, drivers = [], []
              for terms, asset_tags, driver_tags in TAG_RULES:
                  if any(contains_term(text, term) for term in terms):
                      assets.extend(asset_tags)
                      drivers.extend(driver_tags)
              return normalize(assets), normalize(drivers)

          def reliability(tier):
              return {"official": 5, "public": 4, "news": 3, "gdelt": 3}.get(tier, 2)

          def transmission(tags):
              tags = set(tags)
              parts = []
              if tags & {"rates", "usd", "inflation"}:
                  parts.append("watch USD and real-yield reaction")
              if tags & {"geopolitics", "sanctions", "risk"}:
                  parts.append("risk premium can rise or fade quickly")
              if tags & {"oil", "energy"}:
                  parts.append("oil can feed inflation expectations")
              if tags & {"xauusd", "gold"}:
                  parts.append("gold impact depends on USD, real yields, and haven demand")
              return "; ".join(parts) or "market impact unclear"

          def bias(title, tags):
              text = title.lower()
              tags = set(tags)
              if tags & {"geopolitics", "sanctions", "risk"}:
                  if any(word in text for word in ("talks", "truce", "ceasefire", "progress", "deal")):
                      return "May reduce gold/oil risk premium if confirmed; fragile talks can reverse quickly."
                  return "May support gold/oil risk premium if escalation is confirmed."
              if tags & {"oil", "energy"}:
                  return "Energy risk can affect inflation expectations, USD, and commodity FX."
              if tags & {"rates", "usd", "inflation"}:
                  return "Rates/USD-sensitive; check real yields and dollar reaction before drawing a conclusion."
              if tags & {"gold", "xauusd"}:
                  return "Gold-relevant; direction needs confirmation from USD and real yields."
              return "Context item; market direction unclear."

          def score(item):
              tags = set(item["asset_tags"] + item["driver_tags"])
              text = f"{item['title']} {item['summary']}".lower()
              value = 1
              if reliability(item["tier"]) >= 5:
                  value += 1
              if tags & {"xauusd", "gold", "usd", "rates", "oil", "inflation", "geopolitics", "sanctions"}:
                  value += 1
              if any(contains_term(text, term) for term in HIGH_IMPACT):
                  value += 1
              item["impact"] = max(1, min(5, value))
              item["confidence"] = "High" if reliability(item["tier"]) >= 5 else ("Medium" if reliability(item["tier"]) >= 4 or item["source"] == "GDELT" else "Low")
              item["bias"] = bias(item["title"], tags)
              item["mechanism"] = transmission(tags)
              return item

          def make_item(source, title, url, published, summary, extra_tags=None):
              title = clean(title, 180)
              summary = clean(summary, 260)
              inferred_assets, inferred_drivers = infer_tags(title, summary)
              return score({
                  "title": title,
                  "url": url,
                  "published": published.isoformat() if published else "",
                  "summary": summary,
                  "source": source["name"],
                  "tier": source["tier"],
                  "asset_tags": normalize(source.get("tags", []) + (extra_tags or []) + inferred_assets),
                  "driver_tags": inferred_drivers,
              })

          def fetch_rss(source):
              try:
                  root = ET.fromstring(fetch(source["url"]))
              except Exception as exc:
                  print(f"RSS fetch skipped: {source['id']} - {exc}")
                  return []
              nodes = root.findall(".//item") or [node for node in root.iter() if local_name(node.tag) == "entry"]
              items = []
              for node in nodes[:12]:
                  title = child_text(node, "title")
                  link = child_text(node, "link") or child_attr(node, "link", "href")
                  published = parse_dt(child_text(node, "pubDate") or child_text(node, "published") or child_text(node, "updated"))
                  if published and published < SINCE:
                      continue
                  summary = child_text(node, "description") or child_text(node, "summary")
                  if title:
                      items.append(make_item(source, title, link, published, summary))
              return items

          def enough_english(title):
              return len(re.findall(r"[A-Za-z]", clean(title, 180))) >= 12

          def fetch_gdelt(query_id, query):
              endpoint = "https://api.gdeltproject.org/api/v2/doc/doc"
              params = urllib.parse.urlencode({
                  "query": query,
                  "mode": "ArtList",
                  "format": "json",
                  "maxrecords": "8",
                  "timespan": "24h",
                  "sort": "HybridRel",
              })
              try:
                  payload = fetch(f"{endpoint}?{params}")
                  parsed = json.loads(payload.decode("utf-8", errors="replace"))
              except Exception as exc:
                  print(f"GDELT fetch skipped: {query_id} - {exc}")
                  return []
              source = {"id": "gdelt", "name": "GDELT", "tier": "gdelt", "tags": []}
              items = []
              for article in parsed.get("articles", [])[:8]:
                  if article.get("language") and article.get("language").lower() != "english":
                      continue
                  title = article.get("title", "")
                  if not title or not enough_english(title):
                      continue
                  summary = " ".join(part for part in [
                      f"Domain: {article.get('domain')}." if article.get("domain") else "",
                      f"Country: {article.get('sourcecountry')}." if article.get("sourcecountry") else "",
                  ] if part)
                  query_tags, _ = infer_tags(query, "")
                  items.append(make_item(source, title, article.get("url", ""), parse_dt(article.get("seendate", "")), summary, query_tags))
              return items

          def dedupe(items):
              seen, result = set(), []
              for item in sorted(items, key=lambda x: (x["impact"], x.get("published", "")), reverse=True):
                  key = re.sub(r"[^a-z0-9]+", " ", (item.get("url") or item["title"]).lower()).strip()
                  if key in seen:
                      continue
                  seen.add(key)
                  result.append(item)
              return result

          def with_tags(items, tags, limit):
              tags = set(tags)
              matches = []
              for item in items:
                  item_tags = set(item["asset_tags"] + item["driver_tags"])
                  if item_tags & tags:
                      matches.append(item)
                  if len(matches) >= limit:
                      break
              return matches

          def email_relevant(items, limit):
              return with_tags(items, {"xauusd", "gold", "usd", "rates", "oil", "inflation", "sanctions", "geopolitics"}, limit)

          def desk_score(items, tags):
              scores = [item["impact"] for item in items if set(item["asset_tags"] + item["driver_tags"]) & set(tags)]
              return max(scores) if scores else 1

          def risk_mix(items):
              buckets = [
                  ("Gold / Rates", {"xauusd", "gold", "rates", "usd"}),
                  ("Oil / Inflation", {"oil", "energy", "inflation"}),
                  ("Geo Risk", {"geopolitics", "sanctions", "risk"}),
                  ("China / Growth", {"china", "copper", "aud", "fx"}),
              ]
              result = []
              for label, tags in buckets:
                  count = 0
                  for item in items:
                      if set(item["asset_tags"] + item["driver_tags"]) & tags:
                          count += 1
                  result.append((label, count))
              return result

          def xauusd_bias(items):
              xau = with_tags(items, {"xauusd", "gold", "rates", "usd", "oil", "sanctions", "geopolitics"}, 8)
              if not xau:
                  return "No clear XAUUSD signal in this run."
              text = " ".join((item["bias"] + " " + item["title"]).lower() for item in xau)
              supportive = sum(1 for word in ("support", "risk premium", "oil risk", "safe-haven") if word in text)
              negative = sum(1 for word in ("reduce", "negative", "real yields", "stronger usd", "hawkish") if word in text)
              if supportive > negative + 1:
                  return "XAUUSD bias: supportive, mainly through risk-premium or inflation channels. Confirm with USD and real yields."
              if negative > supportive + 1:
                  return "XAUUSD bias: pressured, mainly through USD/rates channels. Confirm with real yields and dollar strength."
              return "XAUUSD bias: mixed. Risk-premium headlines and USD/rates confirmation are pulling against each other."

          def current_state(items):
              return {
                  "generated_at": NOW.isoformat(),
                  "scores": {
                      "xauusd_gold": desk_score(items, {"xauusd", "gold", "usd", "rates"}),
                      "usd_rates": desk_score(items, {"usd", "rates", "inflation"}),
                      "oil_inflation": desk_score(items, {"oil", "energy", "inflation"}),
                      "geo_risk": desk_score(items, {"geopolitics", "sanctions", "risk"}),
                  },
                  "xauusd_bias": xauusd_bias(items),
              }

          def load_previous_state():
              try:
                  if STATE_PATH.exists():
                      return json.loads(STATE_PATH.read_text(encoding="utf-8"))
              except Exception as exc:
                  print(f"Previous state skipped: {exc}")
              return None

          def save_state(state):
              STATE_PATH.parent.mkdir(parents=True, exist_ok=True)
              STATE_PATH.write_text(json.dumps(state, indent=2), encoding="utf-8")

          def heat(value):
              if value >= 4:
                  return "High", "#fee2e2", "#991b1b"
              if value >= 3:
                  return "Medium", "#fef3c7", "#92400e"
              return "Low", "#dcfce7", "#166534"

          def badge(value):
              label, bg, fg = heat(value)
              return f'<span style="display:inline-block;padding:5px 10px;border-radius:999px;background:{bg};color:{fg};font-size:12px;font-weight:bold;">{label}</span>'

          def dashboard_cell(label, value, note):
              return f"""
              <td style="width:50%;padding:10px;border:1px solid #e2e8f0;border-radius:10px;vertical-align:top;">
                <div style="font-size:13px;color:#64748b;">{html.escape(label)}</div>
                <div style="margin:8px 0;">{badge(value)}</div>
                <div style="font-size:12px;color:#475569;line-height:1.35;">{html.escape(note)}</div>
              </td>"""

          def market_cell(row):
              change = market_change(row)
              color = "#166534" if "up" in change else ("#991b1b" if "down" in change else "#64748b")
              return f"""
              <td style="width:25%;padding:10px;border:1px solid #e2e8f0;border-radius:10px;vertical-align:top;">
                <div style="font-size:12px;color:#64748b;">{html.escape(row["label"])}</div>
                <div style="font-size:18px;font-weight:bold;margin:6px 0;">{html.escape(market_value(row))}</div>
                <div style="font-size:12px;color:{color};">{html.escape(change)}</div>
              </td>"""

          def rate_cell(row):
              change = rate_change(row)
              color = "#991b1b" if "up" in change else ("#166534" if "down" in change else "#64748b")
              return f"""
              <td style="width:50%;padding:10px;border:1px solid #e2e8f0;border-radius:10px;vertical-align:top;">
                <div style="font-size:12px;color:#64748b;">{html.escape(row["label"])}</div>
                <div style="font-size:18px;font-weight:bold;margin:6px 0;">{html.escape(rate_value(row))}</div>
                <div style="font-size:12px;color:{color};">{html.escape(change)}</div>
              </td>"""

          def calendar_html(events):
              if not events:
                  return '<p style="margin:0;color:#64748b;">No high-priority calendar risks found in the next 48 hours.</p>'
              colors = {"High": "#991b1b", "Medium": "#92400e", "Low": "#475569"}
              rows = []
              for event in events:
                  color = colors.get(event["importance"], "#475569")
                  rows.append(f"""
                  <li style="margin:8px 0;">
                    <strong>{html.escape(event["name"])}</strong><br>
                    <span style="color:#475569;">{html.escape(event["time"])} Asia/Beirut</span>
                    <span style="color:{color};font-size:12px;font-weight:bold;">{html.escape(event["importance"])}</span>
                  </li>""")
              return '<ul style="margin:0;padding-left:20px;color:#334155;line-height:1.45;">' + "".join(rows) + "</ul>"

          def risk_mix_html(items):
              mix = [(label, count) for label, count in risk_mix(items) if count]
              if not mix:
                  return '<p style="margin:0;color:#64748b;">No clean signal mix available for this run.</p>'
              total = sum(count for _, count in mix) or 1
              colors = ["#d97706", "#dc2626", "#7c3aed", "#2563eb"]
              segments, labels = [], []
              cursor = 0.0
              for i, (label, count) in enumerate(mix):
                  share = count / total * 100
                  next_cursor = cursor + share
                  segments.append(f"{colors[i]} {cursor:.1f}% {next_cursor:.1f}%")
                  labels.append(
                      "<tr>"
                      f'<td style="padding:3px 8px 3px 0;"><span style="display:inline-block;width:10px;height:10px;background:{colors[i]};border-radius:50%;"></span></td>'
                      f'<td style="padding:3px 0;color:#334155;font-size:13px;">{html.escape(label)}</td>'
                      f'<td style="padding:3px 0 3px 12px;color:#64748b;font-size:13px;text-align:right;">{count} ({share:.0f}%)</td>'
                      "</tr>"
                  )
                  cursor = next_cursor
              return (
                  '<table role="presentation" style="width:100%;border-collapse:collapse;"><tr>'
                  '<td style="width:130px;vertical-align:top;padding-right:18px;">'
                  f'<div style="width:112px;height:112px;border-radius:50%;background:conic-gradient({", ".join(segments)});border:1px solid #e2e8f0;"></div>'
                  '</td><td style="vertical-align:middle;">'
                  '<table role="presentation" style="width:100%;border-collapse:collapse;">'
                  + "".join(labels)
                  + "</table></td></tr></table>"
              )

          def previous_change_html(previous, state):
              if not previous:
                  return "<p style='margin:0;color:#64748b;'>No previous run stored yet. This will start tracking after the first real digest.</p>"
              rows = []
              labels = {
                  "xauusd_gold": "XAUUSD / Gold",
                  "usd_rates": "USD / Rates",
                  "oil_inflation": "Oil / Inflation",
                  "geo_risk": "Geo Risk",
              }
              prev_scores = previous.get("scores", {})
              for key, label in labels.items():
                  old = int(prev_scores.get(key, state["scores"][key]))
                  new = int(state["scores"][key])
                  move = "higher" if new > old else ("lower" if new < old else "flat")
                  color = "#991b1b" if new > old else ("#166534" if new < old else "#64748b")
                  width = max(10, min(100, new * 20))
                  rows.append(
                      "<tr>"
                      f'<td style="width:140px;padding:6px 10px 6px 0;color:#334155;font-size:13px;">{html.escape(label)}</td>'
                      f'<td style="width:74px;padding:6px 8px;color:#64748b;font-size:13px;text-align:right;">{old}/5 -> {new}/5</td>'
                      '<td style="padding:6px 0;">'
                      '<div style="height:9px;background:#e5e7eb;border-radius:999px;overflow:hidden;">'
                      f'<div style="height:9px;width:{width}%;background:{color};border-radius:999px;"></div>'
                      "</div>"
                      f'<div style="margin-top:3px;color:{color};font-size:11px;">{move}</div>'
                      "</td></tr>"
                  )
              return '<table role="presentation" style="width:100%;border-collapse:collapse;">' + "".join(rows) + "</table>"

          def previous_change_text(previous, state):
              if not previous:
                  return "- No previous run stored yet. This will start tracking after the first real digest."
              rows = []
              labels = {
                  "xauusd_gold": "XAUUSD / Gold",
                  "usd_rates": "USD / Rates",
                  "oil_inflation": "Oil / Inflation",
                  "geo_risk": "Geo Risk",
              }
              prev_scores = previous.get("scores", {})
              for key, label in labels.items():
                  old = int(prev_scores.get(key, state["scores"][key]))
                  new = int(state["scores"][key])
                  move = "higher" if new > old else ("lower" if new < old else "flat")
                  rows.append(f"- {label}: {old}/5 -> {new}/5 ({move})")
              return chr(10).join(rows)

          def item_html(item):
              return f"""
              <li style="margin:10px 0;">
                <strong>{html.escape(item['title'])}</strong><br>
                <span style="color:#475569;">{html.escape(item['bias'])}</span><br>
                <span style="font-size:12px;color:#64748b;">Impact {item['impact']}/5 | Confidence {html.escape(item['confidence'])}</span>
              </li>"""

          def item_text(item):
              return f"- {item['title']}: {item['bias']} (Impact {item['impact']}/5, {item['confidence']})"

          def build_email(items, market_rows, rate_rows, calendar_events, previous, state):
              top = email_relevant(items, 3)
              xau = with_tags(items, {"xauusd", "gold", "rates", "usd", "real_yields", "oil", "sanctions", "geopolitics"}, 3)
              rates = with_tags(items, {"rates", "fed", "inflation", "real_yields", "usd"}, 2)
              bottom = f"{top[0]['title']}: {top[0]['bias']}" if top else "No high-quality market-moving items were collected in this run."
              generated = NOW.strftime("%Y-%m-%d %H:%M Asia/Beirut")
              text = f"""Market Intelligence Brief

          {generated}

          Bottom Line
          {bottom}

          Market Snapshot
          {chr(10).join(f"- {row['label']}: {market_value(row)} | {market_change(row)}" for row in market_rows)}

          Real Yield Snapshot
          {chr(10).join(f"- {row['label']}: {rate_value(row)} | {rate_change(row)}" for row in rate_rows)}

          Calendar Risk - Next 48h
          {chr(10).join(f"- {event['time']} Asia/Beirut | {event['importance']} | {event['name']}" for event in calendar_events) or "- No high-priority calendar risks found in the next 48 hours."}

          Change Since Previous Digest
          {previous_change_text(previous, state)}

          What Matters
          {chr(10).join(item_text(item) for item in top) or "- No major items collected."}

          XAUUSD Read
          {chr(10).join(item_text(item) for item in xau) or "- No clean XAUUSD signal in this run."}

          XAUUSD Bias
          {xauusd_bias(items)}

          USD / Rates Watch
          {chr(10).join(item_text(item) for item in rates) or "- No major USD/rates item collected."}

          Action
          - Treat this as context, not a trade signal.
          - Before acting, check live XAUUSD, USD, real yields, oil, and session liquidity.

          Invalidation
          This read weakens if live prices do not confirm the headline channel, official sources contradict the story, or USD/real yields move against the implied gold direction.
          """
              html_body = f"""<!doctype html>
          <html>
            <body style="margin:0;background:#f6f8fb;font-family:Arial,Helvetica,sans-serif;color:#0f172a;">
              <div style="max-width:760px;margin:0 auto;padding:24px;">
                <div style="background:#0f172a;color:#fff;border-radius:12px;padding:22px 24px;">
                  <div style="font-size:13px;color:#cbd5e1;">{html.escape(generated)}</div>
                  <h1 style="margin:8px 0 0;font-size:24px;line-height:1.2;">Market Intelligence Brief</h1>
                </div>

                <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:18px 20px;margin-top:16px;">
                  <h2 style="margin:0 0 8px;font-size:17px;">Bottom Line</h2>
                  <p style="margin:0;color:#334155;line-height:1.5;">{html.escape(bottom)}</p>
                </div>

                <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:18px 20px;margin-top:16px;">
                  <h2 style="margin:0 0 12px;font-size:17px;">Market Snapshot</h2>
                  <table role="presentation" style="width:100%;border-collapse:separate;border-spacing:8px;"><tr>{''.join(market_cell(row) for row in market_rows)}</tr></table>
                </div>

                <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:18px 20px;margin-top:16px;">
                  <h2 style="margin:0 0 12px;font-size:17px;">Real Yield Snapshot</h2>
                  <table role="presentation" style="width:100%;border-collapse:separate;border-spacing:8px;"><tr>{''.join(rate_cell(row) for row in rate_rows)}</tr></table>
                </div>

                <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:18px 20px;margin-top:16px;">
                  <h2 style="margin:0 0 12px;font-size:17px;">Signal Dashboard</h2>
                  <table role="presentation" style="width:100%;border-collapse:separate;border-spacing:8px;">
                    <tr>
                      {dashboard_cell("XAUUSD / Gold", desk_score(items, {"xauusd", "gold", "usd", "rates"}), "Needs USD and real-yield confirmation.")}
                      {dashboard_cell("USD / Rates", desk_score(items, {"usd", "rates", "inflation"}), "Watch yields, Fed path, and dollar reaction.")}
                    </tr>
                    <tr>
                      {dashboard_cell("Oil / Inflation", desk_score(items, {"oil", "energy", "inflation"}), "Energy shocks can feed inflation expectations.")}
                      {dashboard_cell("Geo Risk", desk_score(items, {"geopolitics", "sanctions", "risk"}), "Separate escalation from de-escalation headlines.")}
                    </tr>
                  </table>
                </div>

                <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:18px 20px;margin-top:16px;">
                  <h2 style="margin:0 0 12px;font-size:17px;">Change Since Previous Digest</h2>
                  {previous_change_html(previous, state)}
                </div>

                <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:18px 20px;margin-top:16px;">
                  <h2 style="margin:0 0 12px;font-size:17px;">Signal Mix</h2>
                  {risk_mix_html(items)}
                </div>

                <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:18px 20px;margin-top:16px;">
                  <h2 style="margin:0 0 12px;font-size:17px;">Calendar Risk - Next 48h</h2>
                  {calendar_html(calendar_events)}
                </div>

                <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:18px 20px;margin-top:16px;">
                  <h2 style="margin:0 0 8px;font-size:17px;">What Matters</h2>
                  <ol style="padding-left:20px;margin:0;color:#334155;line-height:1.45;">{''.join(item_html(item) for item in top) or '<li>No major items collected.</li>'}</ol>
                </div>

                <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:18px 20px;margin-top:16px;">
                  <h2 style="margin:0 0 8px;font-size:17px;">XAUUSD Read</h2>
                  <ul style="padding-left:20px;margin:0;color:#334155;line-height:1.45;">{''.join(item_html(item) for item in xau) or '<li>No clean XAUUSD signal in this run.</li>'}</ul>
                  <p style="margin:12px 0 0;color:#0f172a;line-height:1.45;"><strong>{html.escape(xauusd_bias(items))}</strong></p>
                </div>

                <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:18px 20px;margin-top:16px;">
                  <h2 style="margin:0 0 8px;font-size:17px;">USD / Rates Watch</h2>
                  <ul style="padding-left:20px;margin:0;color:#334155;line-height:1.45;">{''.join(item_html(item) for item in rates) or '<li>No major USD/rates item collected.</li>'}</ul>
                </div>

                <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:18px 20px;margin-top:16px;">
                  <h2 style="margin:0 0 8px;font-size:17px;">Action</h2>
                  <p style="margin:0;color:#334155;line-height:1.5;">Treat this as context, not a trade signal. Before acting, check live XAUUSD, USD, real yields, oil, and session liquidity.</p>
                </div>

                <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:18px 20px;margin-top:16px;">
                  <h2 style="margin:0 0 8px;font-size:17px;">Invalidation</h2>
                  <p style="margin:0;color:#334155;line-height:1.5;">This read weakens if live prices do not confirm the headline channel, official sources contradict the story, or USD/real yields move against the implied gold direction.</p>
                </div>

                <p style="font-size:12px;color:#64748b;margin:16px 4px 0;">No source links in this email. Ask Codex for details if needed.</p>
              </div>
            </body>
          </html>"""
              return text, html_body

          def send_email(text, html_body):
              required = ["SMTP_HOST", "SMTP_PORT", "SMTP_USERNAME", "SMTP_PASSWORD", "SMTP_FROM", "EMAIL_TO"]
              missing = [name for name in required if not os.environ.get(name)]
              if missing:
                  raise SystemExit(f"Missing secrets/env values: {', '.join(missing)}")
              msg = EmailMessage()
              msg["From"] = os.environ["SMTP_FROM"]
              msg["To"] = os.environ["EMAIL_TO"]
              msg["Subject"] = f"Market Intelligence Digest - {NOW.strftime('%Y-%m-%d %H:%M')} Asia/Beirut"
              msg.set_content(text)
              msg.add_alternative(html_body, subtype="html")
              with smtplib.SMTP_SSL(os.environ["SMTP_HOST"], int(os.environ["SMTP_PORT"]), timeout=30) as smtp:
                  smtp.login(os.environ["SMTP_USERNAME"], os.environ["SMTP_PASSWORD"])
                  smtp.send_message(msg)

          items = []
          for source in RSS_SOURCES:
              items.extend(fetch_rss(source))

          for query_id, query in GDELT_QUERIES:
              items.extend(fetch_gdelt(query_id, query))
              time.sleep(3)

          items = dedupe(items)
          market_rows = fetch_market_snapshot()
          rate_rows = fetch_rate_snapshot()
          calendar_events = calendar_risks()
          previous = load_previous_state()
          state = current_state(items)
          text_body, html_body = build_email(items, market_rows, rate_rows, calendar_events, previous, state)
          send_email(text_body, html_body)
          save_state(state)
          print(f"Sent digest with {len(items)} collected items.")
          PY

      - name: Save digest state
        if: steps.beirut_time.outputs.send == 'true'
        run: |
          git config user.name "market-intel-bot"
          git config user.email "market-intel-bot@example.com"
          git add .digest-state/latest.json
          git commit -m "Update market digest state" || echo "No state changes to commit"
          git push
