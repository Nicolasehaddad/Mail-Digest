name: Market Intelligence Digest

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    # GitHub schedules can run late or skip individual ticks. Wake often,
    # then send once per Beirut target slot with a grace window.
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve Beirut send slot
        id: beirut_time
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, time, timedelta
          from pathlib import Path
          from zoneinfo import ZoneInfo

          tz = ZoneInfo("Asia/Beirut")
          now = datetime.now(tz)
          output = Path(os.environ["GITHUB_OUTPUT"])

          def emit(key, value):
              with output.open("a", encoding="utf-8") as handle:
                  handle.write(f"{key}={value}\n")

          emit("local_time", now.strftime("%Y-%m-%d %H:%M"))
          if os.environ.get("GITHUB_EVENT_NAME") == "workflow_dispatch":
              emit("send", "true")
              emit("send_slot", "manual-" + now.strftime("%Y-%m-%d-%H%M%S"))
              print(f"Manual run: sending now at {now:%Y-%m-%d %H:%M} Asia/Beirut.")
              raise SystemExit(0)

          try:
              sent = set(json.loads(Path(".digest-state/send-slots.json").read_text(encoding="utf-8")).get("sent_slots", []))
          except Exception:
              sent = set()

          candidates = []
          for day_offset in (0, 1):
              day = (now - timedelta(days=day_offset)).date()
              for hour in (8, 13, 23):
                  target = datetime.combine(day, time(hour, 0), tzinfo=tz)
                  delta = now - target
                  if timedelta(0) <= delta <= timedelta(minutes=240):
                      candidates.append(target)

          if not candidates:
              emit("send", "false")
              print(f"Skipping: {now:%Y-%m-%d %H:%M} Asia/Beirut is outside the digest windows.")
              raise SystemExit(0)

          target = max(candidates)
          slot = target.strftime("%Y-%m-%d-%H")
          emit("send_slot", slot)
          if slot in sent:
              emit("send", "false")
              print(f"Skipping: digest slot {slot} was already sent.")
          else:
              emit("send", "true")
              print(f"Sending digest for Beirut slot {slot}; current time is {now:%Y-%m-%d %H:%M}.")
          PY

      - name: Build and send market intelligence digest
        if: steps.beirut_time.outputs.send == 'true'
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          EMAIL_TO: nicolasehaddad@gmail.com
        run: |
          python - <<'PY'
          import csv
          import email.utils
          import html
          import json
          import os
          import re
          import smtplib
          import time
          import urllib.parse
          import urllib.request
          import xml.etree.ElementTree as ET
          from datetime import datetime, timedelta, timezone
          from email.message import EmailMessage
          from io import StringIO
          from pathlib import Path
          from zoneinfo import ZoneInfo

          TZ = ZoneInfo("Asia/Beirut")
          NOW = datetime.now(TZ)
          SINCE = NOW.astimezone(timezone.utc) - timedelta(hours=24)
          STATE_PATH = Path(".digest-state/latest.json")
          UA = "Mozilla/5.0"

          RSS = [
              ("Federal Reserve", "https://www.federalreserve.gov/feeds/press_monetary.xml", "official", ["usd", "rates", "xauusd"]),
              ("Federal Reserve Speeches", "https://www.federalreserve.gov/feeds/speeches.xml", "official", ["usd", "rates", "xauusd"]),
              ("ECB", "https://www.ecb.europa.eu/rss/press.html", "official", ["eur", "rates", "usd"]),
              ("BBC Business", "https://feeds.bbci.co.uk/news/business/rss.xml", "public", []),
              ("BBC World", "https://feeds.bbci.co.uk/news/world/rss.xml", "public", []),
              ("Al Jazeera", "https://www.aljazeera.com/xml/rss/all.xml", "news", []),
              ("EIA", "https://www.eia.gov/rss/todayinenergy.xml", "official", ["oil", "energy", "inflation"]),
          ]
          GDELT = [
              ("gold_macro", '(gold OR XAUUSD OR "central bank gold" OR "gold ETF" OR "real yields")'),
              ("fed_usd_rates", '(Federal Reserve OR FOMC OR Powell OR "Treasury yields" OR CPI OR PCE OR payrolls)'),
              ("oil_geopolitics", '(Brent OR WTI OR oil OR OPEC OR "Strait of Hormuz" OR "Red Sea" OR tanker OR refinery)'),
              ("middle_east_risk", '("Middle East" OR Iran OR Israel OR Lebanon OR Syria OR Gaza OR Qatar OR Saudi OR "Red Sea")'),
          ]
          MARKET = [
              ("XAUUSD proxy", "GC=F", "$"),
              ("US Dollar Index", "DX-Y.NYB", ""),
              ("US 10Y yield", "^TNX", "%"),
              ("WTI crude", "CL=F", "$"),
          ]
          FRED = [("US 10Y real yield", "DFII10"), ("US 10Y breakeven", "T10YIE")]
          IMPORTANT_CALENDAR = {
              "Consumer Price Index": "High", "Employment Situation": "High",
              "Personal Income and the PCE Deflator": "High", "FOMC": "High",
              "Federal Funds": "High", "Powell": "High", "Gross Domestic Product": "Medium",
              "Producer Price Index": "Medium", "Initial Claims": "Medium", "JOLTS": "Medium",
              "Retail Sales": "Medium", "Durable Goods": "Medium", "Consumer Confidence": "Medium",
              "ADP": "Medium", "ISM Manufacturing": "Medium", "ISM Non-Manufacturing": "Medium",
              "Michigan Consumer Survey": "Medium",
          }

          def fetch(url, timeout=20):
              req = urllib.request.Request(url, headers={"User-Agent": UA})
              with urllib.request.urlopen(req, timeout=timeout) as response:
                  return response.read()

          def clean(value, limit=220):
              value = html.unescape(re.sub(r"<[^>]+>", " ", value or ""))
              value = value.translate(str.maketrans({
                  "\u2018": "'", "\u2019": "'", "\u201c": '"', "\u201d": '"',
                  "\u2013": "-", "\u2014": "-", "\u2026": "...", "\u00a0": " ",
              }))
              value = re.sub(r"\s+", " ", value).strip()
              return value if len(value) <= limit else value[: limit - 3].rstrip() + "..."

          def parse_dt(value):
              if not value:
                  return None
              for parser in (
                  lambda x: datetime.fromisoformat(x.replace("Z", "+00:00")),
                  email.utils.parsedate_to_datetime,
              ):
                  try:
                      dt = parser(value)
                      return (dt if dt.tzinfo else dt.replace(tzinfo=timezone.utc)).astimezone(timezone.utc)
                  except Exception:
                      pass
              return None

          def tags_for(text):
              text = text.lower()
              tags = set()
              rules = [
                  (("gold", "xau", "bullion"), ("xauusd", "gold")),
                  (("fed", "fomc", "powell", "treasury", "yield", "real yield"), ("usd", "rates", "xauusd")),
                  (("cpi", "pce", "inflation", "payroll", "jobs"), ("usd", "rates", "inflation", "xauusd")),
                  (("oil", "brent", "wti", "opec", "hormuz", "red sea", "tanker"), ("oil", "energy", "inflation")),
                  (("sanction", "ofac", "iran", "israel", "lebanon", "gaza", "missile", "ceasefire"), ("geopolitics", "risk", "oil", "xauusd")),
                  (("china", "yuan", "renminbi", "pboc", "property"), ("china", "fx", "risk")),
              ]
              for words, found_tags in rules:
                  if any(word in text for word in words):
                      tags.update(found_tags)
              return sorted(tags)

          def bias(title, tags):
              text = title.lower()
              tags = set(tags)
              if tags & {"geopolitics", "risk"}:
                  if any(word in text for word in ("talks", "truce", "ceasefire", "deal", "progress")):
                      return "May reduce gold/oil risk premium if confirmed; fragile headlines can reverse quickly."
                  return "May support gold/oil risk premium if escalation is confirmed."
              if tags & {"rates", "usd", "inflation"}:
                  return "Rates/USD-sensitive; check real yields and dollar reaction before drawing a conclusion."
              if tags & {"oil", "energy"}:
                  return "Energy risk can affect inflation expectations, USD, and commodity FX."
              if tags & {"gold", "xauusd"}:
                  return "Gold-relevant; direction needs confirmation from USD and real yields."
              return "Context item; market direction unclear."

          def score_item(item):
              text = f"{item['title']} {item['summary']}".lower()
              score = 1
              if item["tier"] == "official":
                  score += 1
              if set(item["tags"]) & {"xauusd", "gold", "usd", "rates", "oil", "inflation", "geopolitics", "risk"}:
                  score += 1
              if any(word in text for word in ("fed", "fomc", "powell", "cpi", "pce", "payroll", "opec", "hormuz", "red sea", "gold", "real yield")):
                  score += 1
              item["impact"] = max(1, min(5, score))
              item["confidence"] = "High" if item["tier"] == "official" else ("Medium" if item["tier"] in {"public", "gdelt"} else "Low")
              item["bias"] = bias(item["title"], item["tags"])
              return item

          def item(source, title, url, published, summary, extra_tags=None):
              title = clean(title, 170)
              summary = clean(summary, 220)
              tags = sorted(set((extra_tags or []) + tags_for(f"{title} {summary}")))
              return score_item({"source": source[0], "tier": source[2], "title": title, "url": url, "published": published or "", "summary": summary, "tags": tags})

          def child_text(node, name):
              for child in list(node):
                  if child.tag.rsplit("}", 1)[-1].lower() == name.lower():
                      return (child.text or "").strip()
              return ""

          def fetch_rss(source):
              try:
                  root = ET.fromstring(fetch(source[1]))
              except Exception as exc:
                  print(f"RSS skipped {source[0]}: {exc}")
                  return []
              nodes = root.findall(".//item") or [n for n in root.iter() if n.tag.rsplit("}", 1)[-1].lower() == "entry"]
              rows = []
              for node in nodes[:12]:
                  title = child_text(node, "title")
                  link = child_text(node, "link") or next((c.attrib.get("href", "") for c in list(node) if c.tag.rsplit("}", 1)[-1].lower() == "link"), "")
                  published_dt = parse_dt(child_text(node, "pubDate") or child_text(node, "published") or child_text(node, "updated"))
                  if published_dt and published_dt < SINCE:
                      continue
                  summary = child_text(node, "description") or child_text(node, "summary")
                  if title:
                      rows.append(item(source, title, link, published_dt.isoformat() if published_dt else "", summary, source[3]))
              return rows

          def fetch_gdelt(query_id, query):
              params = urllib.parse.urlencode({"query": query, "mode": "ArtList", "format": "json", "maxrecords": "8", "timespan": "24h", "sort": "HybridRel"})
              try:
                  parsed = json.loads(fetch("https://api.gdeltproject.org/api/v2/doc/doc?" + params, 25).decode("utf-8", "replace"))
              except Exception as exc:
                  print(f"GDELT skipped {query_id}: {exc}")
                  return []
              source = ("GDELT", "", "gdelt", [])
              rows = []
              for article in parsed.get("articles", [])[:8]:
                  title = article.get("title", "")
                  if article.get("language", "english").lower() != "english" or len(re.findall(r"[A-Za-z]", title)) < 12:
                      continue
                  summary = " ".join(part for part in [article.get("domain", ""), article.get("sourcecountry", "")] if part)
                  rows.append(item(source, title, article.get("url", ""), article.get("seendate", ""), summary, tags_for(query)))
              return rows

          def dedupe(rows):
              seen, out = set(), []
              for row in sorted(rows, key=lambda x: (x["impact"], x["published"]), reverse=True):
                  key = re.sub(r"[^a-z0-9]+", " ", (row.get("url") or row["title"]).lower()).strip()
                  if key not in seen:
                      seen.add(key)
                      out.append(row)
              return out

          def yahoo(symbol):
              url = "https://query1.finance.yahoo.com/v8/finance/chart/" + urllib.parse.quote(symbol, safe="") + "?range=5d&interval=1d"
              try:
                  parsed = json.loads(fetch(url, 15).decode("utf-8", "replace"))
                  result = parsed["chart"]["result"][0]
                  closes = [v for v in result["indicators"]["quote"][0].get("close", []) if v is not None]
                  latest = float(result.get("meta", {}).get("regularMarketPrice") or closes[-1])
                  previous = float(closes[-2]) if len(closes) >= 2 else latest
                  return latest, latest - previous, ((latest - previous) / previous * 100) if previous else 0
              except Exception as exc:
                  print(f"Market skipped {symbol}: {exc}")
                  return None

          def fred(series):
              try:
                  text = fetch("https://fred.stlouisfed.org/graph/fredgraph.csv?id=" + urllib.parse.quote(series), 20).decode("utf-8", "replace")
                  values = [(r.get("observation_date", ""), float(r[series])) for r in csv.DictReader(StringIO(text)) if r.get(series) not in {"", "."}]
                  date, latest = values[-1]
                  previous = values[-2][1] if len(values) > 1 else latest
                  return date, latest, latest - previous
              except Exception as exc:
                  print(f"FRED skipped {series}: {exc}")
                  return None

          def market_rows():
              rows = []
              for label, symbol, unit in MARKET:
                  data = yahoo(symbol)
                  rows.append({"label": label, "unit": unit, "data": data})
              return rows

          def rate_rows():
              return [{"label": label, "data": fred(series)} for label, series in FRED]

          def calendar_events():
              events = []
              eastern = timezone(timedelta(hours=-4), "US/Eastern")
              end = NOW + timedelta(hours=48)
              try:
                  page = fetch("https://www.newyorkfed.org/research/calendars/nationalecon_cal", 20).decode("utf-8", "replace")
                  month_match = re.search(r"([A-Za-z]+)\s+(\d{4})", re.sub(r"<[^>]+>", " ", page[88000:90000]))
                  if month_match:
                      month = datetime.strptime(month_match.group(1), "%B").month
                      year = int(month_match.group(2))
                      cells = re.findall(r'<td[^>]*class="somatd[^"]*"[^>]*>\s*<div>(.*?)</div>\s*</td>', page, re.S)
                      for cell in cells:
                          plain = html.unescape(re.sub(r"<[^>]+>", " ", cell))
                          day_match = re.match(r"\s*(\d{1,2})", plain)
                          if not day_match:
                              continue
                          day = int(day_match.group(1))
                          for match in re.finditer(r"([A-Za-z][A-Za-z0-9 /\-&().]+?)\s*\((\d{2}:\d{2})\)", plain):
                              name = clean(match.group(1), 90)
                              hhmm = match.group(2)
                              dt = datetime(year, month, day, int(hhmm[:2]), int(hhmm[3:]), tzinfo=eastern).astimezone(TZ)
                              if NOW <= dt <= end:
                                  importance = next((v for k, v in IMPORTANT_CALENDAR.items() if k.lower() in name.lower()), "Low")
                                  if importance in {"High", "Medium"}:
                                      events.append({"name": name, "time": dt.strftime("%Y-%m-%d %H:%M"), "importance": importance})
              except Exception as exc:
                  print(f"Calendar skipped: {exc}")
              for offset in range(4):
                  day = (NOW + timedelta(days=offset)).date()
                  if day.weekday() == 2:
                      dt = datetime(day.year, day.month, day.day, 10, 30, tzinfo=eastern).astimezone(TZ)
                      if NOW <= dt <= end:
                          events.append({"name": "EIA Weekly Petroleum Status Report", "time": dt.strftime("%Y-%m-%d %H:%M"), "importance": "High"})
              return sorted(events, key=lambda e: e["time"])[:6]

          def filter_items(rows, tags, limit):
              tags = set(tags)
              return [r for r in rows if set(r["tags"]) & tags][:limit]

          def desk_score(rows, tags):
              scores = [r["impact"] for r in rows if set(r["tags"]) & set(tags)]
              return max(scores) if scores else 1

          def signal_scores(rows):
              return {
                  "xauusd_gold": desk_score(rows, {"xauusd", "gold", "usd", "rates"}),
                  "usd_rates": desk_score(rows, {"usd", "rates", "inflation"}),
                  "oil_inflation": desk_score(rows, {"oil", "energy", "inflation"}),
                  "geo_risk": desk_score(rows, {"geopolitics", "risk"}),
              }

          def xauusd_bias(rows):
              xau = filter_items(rows, {"xauusd", "gold", "rates", "usd", "oil", "geopolitics", "risk"}, 8)
              text = " ".join((r["bias"] + " " + r["title"]).lower() for r in xau)
              support = sum(w in text for w in ("support", "risk premium", "safe-haven"))
              negative = sum(w in text for w in ("reduce", "negative", "real yields", "stronger usd", "hawkish"))
              if support > negative + 1:
                  return "XAUUSD bias: supportive, mainly through risk-premium or inflation channels. Confirm with USD and real yields."
              if negative > support + 1:
                  return "XAUUSD bias: pressured, mainly through USD/rates channels. Confirm with real yields and dollar strength."
              return "XAUUSD bias: mixed. Risk-premium headlines and USD/rates confirmation are pulling against each other."

          def fmt_market(row):
              if not row["data"]:
                  return "n/a", "n/a"
              value, change, pct = row["data"]
              val = f"${value:,.2f}" if row["unit"] == "$" else (f"{value:.2f}%" if row["unit"] == "%" else f"{value:,.2f}")
              move = "up" if change > 0 else ("down" if change < 0 else "flat")
              return val, f"{move} {change:+.2f} ({pct:+.2f}%)"

          def fmt_rate(row):
              if not row["data"]:
                  return "n/a", "n/a"
              _, value, change = row["data"]
              move = "up" if change > 0 else ("down" if change < 0 else "flat")
              return f"{value:.2f}%", f"{move} {change:+.2f} pts"

          def load_previous():
              try:
                  return json.loads(STATE_PATH.read_text(encoding="utf-8"))
              except Exception:
                  return None

          def save_state(rows):
              STATE_PATH.parent.mkdir(parents=True, exist_ok=True)
              STATE_PATH.write_text(json.dumps({"generated_at": NOW.isoformat(), "scores": signal_scores(rows), "xauusd_bias": xauusd_bias(rows)}, indent=2), encoding="utf-8")

          def card_table(rows, formatter):
              cells = []
              for row in rows:
                  value, change = formatter(row)
                  color = "#166534" if "up" in change or "down -0" in change else ("#991b1b" if "down" in change or "up +" in change else "#64748b")
                  cells.append(f'<td style="padding:10px;border:1px solid #e2e8f0;border-radius:10px;"><div style="font-size:12px;color:#64748b;">{html.escape(row["label"])}</div><div style="font-size:18px;font-weight:bold;margin:6px 0;">{html.escape(value)}</div><div style="font-size:12px;color:{color};">{html.escape(change)}</div></td>')
              return '<table role="presentation" style="width:100%;border-collapse:separate;border-spacing:8px;"><tr>' + "".join(cells) + "</tr></table>"

          def item_html(rows):
              return "".join(f'<li style="margin:10px 0;"><strong>{html.escape(r["title"])}</strong><br><span style="color:#475569;">{html.escape(r["bias"])}</span><br><span style="font-size:12px;color:#64748b;">Impact {r["impact"]}/5 | Confidence {html.escape(r["confidence"])}</span></li>' for r in rows)

          def build_email(rows, mr, rr, cal, prev):
              scores = signal_scores(rows)
              top = filter_items(rows, {"xauusd", "gold", "usd", "rates", "oil", "inflation", "geopolitics", "risk"}, 3)
              xau = filter_items(rows, {"xauusd", "gold", "rates", "usd", "oil", "geopolitics", "risk"}, 3)
              rates = filter_items(rows, {"rates", "usd", "inflation"}, 2)
              bottom = f"{top[0]['title']}: {top[0]['bias']}" if top else "No high-quality market-moving items were collected in this run."
              prev_scores = (prev or {}).get("scores", {})
              change_lines = []
              for key, label in {"xauusd_gold": "XAUUSD / Gold", "usd_rates": "USD / Rates", "oil_inflation": "Oil / Inflation", "geo_risk": "Geo Risk"}.items():
                  old, new = int(prev_scores.get(key, scores[key])), scores[key]
                  move = "higher" if new > old else ("lower" if new < old else "flat")
                  change_lines.append(f"- {label}: {old}/5 -> {new}/5 ({move})")
              cal_text = "\n".join(f"- {e['time']} Asia/Beirut | {e['importance']} | {e['name']}" for e in cal) or "- No high-priority calendar risks found in the next 48 hours."
              market_text = "\n".join(f"- {r['label']}: {fmt_market(r)[0]} | {fmt_market(r)[1]}" for r in mr)
              real_yield_text = "\n".join(f"- {r['label']}: {fmt_rate(r)[0]} | {fmt_rate(r)[1]}" for r in rr)
              change_text = "\n".join(change_lines) if prev else "- No previous run stored yet. This will start tracking after the first real digest."
              matters_text = "\n".join(f"- {r['title']}: {r['bias']} (Impact {r['impact']}/5, {r['confidence']})" for r in top) or "- No major items collected."
              text = "\n".join([
                  "Market Intelligence Brief",
                  "",
                  f"{NOW:%Y-%m-%d %H:%M} Asia/Beirut",
                  "",
                  "Bottom Line",
                  bottom,
                  "",
                  "Market Snapshot",
                  market_text,
                  "",
                  "Real Yield Snapshot",
                  real_yield_text,
                  "",
                  "Calendar Risk - Next 48h",
                  cal_text,
                  "",
                  "Change Since Previous Digest",
                  change_text,
                  "",
                  "What Matters",
                  matters_text,
                  "",
                  "XAUUSD Bias",
                  xauusd_bias(rows),
                  "",
                  "Action",
                  "- Treat this as context, not a trade signal.",
                  "- Before acting, check live XAUUSD, USD, real yields, oil, and session liquidity.",
                  "",
                  "Invalidation",
                  "This read weakens if live prices do not confirm the headline channel, official sources contradict the story, or USD/real yields move against the implied gold direction.",
              ]) + "\n"
              score_cells = "".join(f'<td style="padding:10px;border:1px solid #e2e8f0;border-radius:10px;"><div style="font-size:13px;color:#64748b;">{label}</div><div style="margin:8px 0;"><strong>{scores[key]}/5</strong></div></td>' for key, label in {"xauusd_gold": "XAUUSD / Gold", "usd_rates": "USD / Rates", "oil_inflation": "Oil / Inflation", "geo_risk": "Geo Risk"}.items())
              change_html = "<p style='margin:0;color:#64748b;'>No previous run stored yet. This will start tracking after the first real digest.</p>" if not prev else "<ul style='margin:0;padding-left:20px;color:#334155;line-height:1.5;'>" + "".join(f"<li>{html.escape(line[2:])}</li>" for line in change_lines) + "</ul>"
              cal_html = "<p style='margin:0;color:#64748b;'>No high-priority calendar risks found in the next 48 hours.</p>" if not cal else "<ul style='margin:0;padding-left:20px;color:#334155;line-height:1.45;'>" + "".join(f"<li><strong>{html.escape(e['name'])}</strong><br><span style='color:#475569;'>{html.escape(e['time'])} Asia/Beirut</span> <strong>{html.escape(e['importance'])}</strong></li>" for e in cal) + "</ul>"
              section = lambda title, body: f'<div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:18px 20px;margin-top:16px;"><h2 style="margin:0 0 12px;font-size:17px;">{title}</h2>{body}</div>'
              html_body = f"""<!doctype html><html><body style="margin:0;background:#f6f8fb;font-family:Arial,Helvetica,sans-serif;color:#0f172a;"><div style="max-width:760px;margin:0 auto;padding:24px;"><div style="background:#0f172a;color:#fff;border-radius:12px;padding:22px 24px;"><div style="font-size:13px;color:#cbd5e1;">{NOW:%Y-%m-%d %H:%M} Asia/Beirut</div><h1 style="margin:8px 0 0;font-size:24px;">Market Intelligence Brief</h1></div>{section("Bottom Line", f'<p style="margin:0;color:#334155;line-height:1.5;">{html.escape(bottom)}</p>')}{section("Market Snapshot", card_table(mr, fmt_market))}{section("Real Yield Snapshot", card_table(rr, fmt_rate))}{section("Signal Dashboard", '<table role="presentation" style="width:100%;border-collapse:separate;border-spacing:8px;"><tr>' + score_cells + '</tr></table>')}{section("Change Since Previous Digest", change_html)}{section("Calendar Risk - Next 48h", cal_html)}{section("What Matters", '<ol style="padding-left:20px;margin:0;color:#334155;line-height:1.45;">' + (item_html(top) or '<li>No major items collected.</li>') + '</ol>')}{section("XAUUSD Read", '<ul style="padding-left:20px;margin:0;color:#334155;line-height:1.45;">' + (item_html(xau) or '<li>No clean XAUUSD signal in this run.</li>') + '</ul><p style="margin:12px 0 0;"><strong>' + html.escape(xauusd_bias(rows)) + '</strong></p>')}{section("USD / Rates Watch", '<ul style="padding-left:20px;margin:0;color:#334155;line-height:1.45;">' + (item_html(rates) or '<li>No major USD/rates item collected.</li>') + '</ul>')}{section("Action", '<p style="margin:0;color:#334155;line-height:1.5;">Treat this as context, not a trade signal. Before acting, check live XAUUSD, USD, real yields, oil, and session liquidity.</p>')}{section("Invalidation", '<p style="margin:0;color:#334155;line-height:1.5;">This read weakens if live prices do not confirm the headline channel, official sources contradict the story, or USD/real yields move against the implied gold direction.</p>')}<p style="font-size:12px;color:#64748b;margin:16px 4px 0;">No source links in this email. Ask Codex for details if needed.</p></div></body></html>"""
              return text, html_body

          rows = []
          for source in RSS:
              rows.extend(fetch_rss(source))
          for query_id, query in GDELT:
              rows.extend(fetch_gdelt(query_id, query))
              time.sleep(2)
          rows = dedupe(rows)
          mr, rr, cal = market_rows(), rate_rows(), calendar_events()
          previous = load_previous()
          text_body, html_body = build_email(rows, mr, rr, cal, previous)
          required = ["SMTP_HOST", "SMTP_PORT", "SMTP_USERNAME", "SMTP_PASSWORD", "SMTP_FROM", "EMAIL_TO"]
          missing = [name for name in required if not os.environ.get(name)]
          if missing:
              raise SystemExit("Missing secrets/env values: " + ", ".join(missing))
          msg = EmailMessage()
          msg["From"] = os.environ["SMTP_FROM"]
          msg["To"] = os.environ["EMAIL_TO"]
          msg["Subject"] = f"Market Intelligence Digest - {NOW:%Y-%m-%d %H:%M} Asia/Beirut"
          msg.set_content(text_body)
          msg.add_alternative(html_body, subtype="html")
          with smtplib.SMTP_SSL(os.environ["SMTP_HOST"], int(os.environ["SMTP_PORT"]), timeout=30) as smtp:
              smtp.login(os.environ["SMTP_USERNAME"], os.environ["SMTP_PASSWORD"])
              smtp.send_message(msg)
          save_state(rows)
          print(f"Sent digest with {len(rows)} collected items.")
          PY

      - name: Save digest state
        if: steps.beirut_time.outputs.send == 'true'
        env:
          SEND_SLOT: ${{ steps.beirut_time.outputs.send_slot }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          slot = os.environ.get("SEND_SLOT", "")
          if slot and not slot.startswith("manual-"):
              path = Path(".digest-state/send-slots.json")
              path.parent.mkdir(parents=True, exist_ok=True)
              try:
                  data = json.loads(path.read_text(encoding="utf-8"))
              except Exception:
                  data = {}
              slots = data.get("sent_slots", [])
              if slot not in slots:
                  slots.append(slot)
              data["sent_slots"] = slots[-60:]
              path.write_text(json.dumps(data, indent=2), encoding="utf-8")
          PY
          git config user.name "market-intel-bot"
          git config user.email "market-intel-bot@example.com"
          git add .digest-state/latest.json .digest-state/send-slots.json
          git commit -m "Update market digest state" || echo "No state changes to commit"
          git push
