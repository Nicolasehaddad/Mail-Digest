name: Market Intelligence Digest

on:
  workflow_dispatch:
  schedule:
    # Runs at 08:01/08:06/08:11, 13:01/13:06/13:11, and 23:01/23:06/23:11
    # in Beirut time. The bash gate and Python script both enforce the 15-minute window.
    - cron: "1,6,11 8,13,23 * * *"
      timezone: "Asia/Beirut"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/market-intel.yml"
      - "scripts/dashboard_preview.py"
      - "scripts/dashboard_digest.py"

permissions:
  contents: write

concurrency:
  group: market-intel-digest
  cancel-in-progress: false

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Decide whether to send
        id: send_window
        shell: bash
        run: |
          local_time="$(TZ=Asia/Beirut date +'%Y-%m-%d %H:%M')"
          local_hour="$(TZ=Asia/Beirut date +'%H')"
          local_minute="$(TZ=Asia/Beirut date +'%M')"
          minute_num=$((10#$local_minute))
          commit_message="$(python - <<'PY'
          import json, os
          path = os.environ.get("GITHUB_EVENT_PATH", "")
          try:
              with open(path, "r", encoding="utf-8") as fh:
                  print(json.load(fh).get("head_commit", {}).get("message", ""))
          except Exception:
              print("")
          PY
          )"

          send=false
          force=false
          reason="outside send conditions"

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            send=true
            force=true
            reason="manual workflow run"
          elif [ "$GITHUB_EVENT_NAME" = "push" ] && printf "%s" "$commit_message" | grep -q "\[send-test-digest\]"; then
            send=true
            force=true
            reason="one-time push test"
          elif [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
            if { [ "$local_hour" = "08" ] || [ "$local_hour" = "13" ] || [ "$local_hour" = "23" ]; } && [ "$minute_num" -le 14 ]; then
              send=true
              reason="scheduled Beirut send window"
            else
              reason="scheduled run outside Beirut send window"
            fi
          fi

          echo "send=$send" >> "$GITHUB_OUTPUT"
          echo "force=$force" >> "$GITHUB_OUTPUT"
          echo "Local Beirut time: $local_time"
          echo "Decision: $send ($reason)"

      - name: Build and send dashboard digest
        if: steps.send_window.outputs.send == 'true'
        env:
          EMAIL_TO: "nicolasehaddad@gmail.com,eliashaddad222@gmail.com"
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: "nicolasehaddad@gmail.com"
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        shell: bash
        run: |
          force_arg=""
          if [ "${{ steps.send_window.outputs.force }}" = "true" ]; then
            force_arg="--force-send"
          fi
          python scripts/dashboard_digest.py \
            --output-dir "firm/outputs/market-dashboard-digests/latest" \
            --state-file ".digest-state/dashboard-send-slots.json" \
            --snapshot-file ".digest-state/last-dashboard-snapshot.json" \
            --scheduled-slots "8,13,23" \
            --send-window-minutes 15 \
            --send-email \
            $force_arg

      - name: Commit digest state
        if: steps.send_window.outputs.send == 'true'
        shell: bash
        run: |
          git config user.name "market-intel-bot"
          git config user.email "market-intel-bot@example.com"
          git add .digest-state firm/outputs/market-dashboard-digests/latest
          if git diff --cached --quiet; then
            echo "No digest state changes"
          else
            git commit -m "Update dashboard digest state"
            git pull --rebase origin main || true
            git push || echo "State push skipped; email already sent"
          fi
