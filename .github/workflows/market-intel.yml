name: Market Intelligence Digest

on:
  workflow_dispatch:
  schedule:
    # GitHub cron is UTC. These are the Beirut targets plus a one-hour
    # fallback for summer/winter time and occasional scheduler delays.
    - cron: '0 5,6,10,11,20,21 * * *'

permissions:
  contents: write

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build and send digest
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: 'nicolasehaddad@gmail.com'
          EMAIL_TO: 'nicolasehaddad@gmail.com, eliashaddad222@gmail.com'
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          python - <<'PY'
          import csv, email.utils, html, json, os, re, smtplib, urllib.parse, urllib.request, xml.etree.ElementTree as ET
          from datetime import datetime, timedelta, timezone
          from email.message import EmailMessage
          from io import StringIO
          from pathlib import Path
          from zoneinfo import ZoneInfo

          TZ = ZoneInfo('Asia/Beirut')
          NOW = datetime.now(TZ)
          STATE_DIR = Path('.digest-state')
          STATE_DIR.mkdir(exist_ok=True)
          SENT_PATH = STATE_DIR / 'send-slots.json'
          SNAPSHOT_PATH = STATE_DIR / 'last-snapshot.json'
          UA = 'Mozilla/5.0 market-intelligence-digest'
          RECIPIENTS = [x.strip() for x in os.environ['EMAIL_TO'].split(',') if x.strip()]

          def fetch(url, timeout=18):
              req = urllib.request.Request(url, headers={'User-Agent': UA})
              with urllib.request.urlopen(req, timeout=timeout) as r:
                  return r.read()

          def clean(value, limit=180):
              value = html.unescape(re.sub(r'<[^>]+>', ' ', value or ''))
              value = re.sub(r'\s+', ' ', value).strip()
              return value if len(value) <= limit else value[:limit - 3].rstrip() + '...'

          def slot_to_send():
              if os.environ.get('GITHUB_EVENT_NAME') == 'workflow_dispatch':
                  return 'manual-' + NOW.strftime('%Y-%m-%d-%H%M')
              try:
                  sent = set(json.loads(SENT_PATH.read_text()).get('sent_slots', []))
              except Exception:
                  sent = set()
              candidates = []
              for day_offset in (0, 1):
                  day = (NOW - timedelta(days=day_offset)).date()
                  for hour in (8, 13, 23):
                      target = datetime(day.year, day.month, day.day, hour, 0, tzinfo=TZ)
                      if timedelta(0) <= NOW - target <= timedelta(minutes=240):
                          candidates.append(target)
              if not candidates:
                  print(f'Skip: {NOW:%Y-%m-%d %H:%M} Asia/Beirut is outside the 08:00, 13:00, 23:00 windows.')
                  return ''
              target = max(candidates)
              slot = target.strftime('%Y-%m-%d-%H')
              if slot in sent:
                  print(f'Skip: slot {slot} already sent.')
                  return ''
              return slot

          def yahoo(symbol):
              url = 'https://query1.finance.yahoo.com/v8/finance/chart/' + urllib.parse.quote(symbol) + '?range=2d&interval=5m'
              try:
                  result = json.loads(fetch(url).decode())['chart']['result'][0]
                  quote = result['indicators']['quote'][0]
                  closes = [x for x in quote['close'] if isinstance(x, (int, float))]
                  if not closes:
                      return None
                  price = closes[-1]
                  prev = next((x for x in reversed(closes[:-1]) if x), price)
                  change = price - prev
                  pct = (change / prev * 100) if prev else 0
                  return {'price': price, 'change': change, 'pct': pct}
              except Exception as e:
                  print('market fetch failed', symbol, e)
                  return None

          def fred(series):
              try:
                  rows = list(csv.DictReader(StringIO(fetch('https://fred.stlouisfed.org/graph/fredgraph.csv?id=' + series).decode())))
                  vals = [float(r[series]) for r in rows if r.get(series) not in (None, '.', '')]
                  if not vals:
                      return None
                  price = vals[-1]
                  prev = vals[-2] if len(vals) > 1 else price
                  return {'price': price, 'change': price - prev, 'pct': 0}
              except Exception as e:
                  print('fred fetch failed', series, e)
                  return None

          markets = {
              'XAUUSD proxy': yahoo('GC=F'),
              'USD/DXY': yahoo('DX-Y.NYB'),
              'US 10Y': yahoo('^TNX'),
              '10Y real yield': fred('DFII10'),
              'WTI oil': yahoo('CL=F'),
          }
          last = json.loads(SNAPSHOT_PATH.read_text()) if SNAPSHOT_PATH.exists() else {}
          snapshot = {k: v for k, v in markets.items() if v}

          def rss_items():
              feeds = [
                  ('Fed', 'https://www.federalreserve.gov/feeds/press_monetary.xml'),
                  ('Fed speeches', 'https://www.federalreserve.gov/feeds/speeches.xml'),
                  ('BBC business', 'https://feeds.bbci.co.uk/news/business/rss.xml'),
                  ('BBC world', 'https://feeds.bbci.co.uk/news/world/rss.xml'),
                  ('Al Jazeera', 'https://www.aljazeera.com/xml/rss/all.xml'),
                  ('EIA', 'https://www.eia.gov/rss/todayinenergy.xml'),
              ]
              out = []
              since = datetime.now(timezone.utc) - timedelta(hours=24)
              keywords = re.compile(r'gold|xau|dollar|fed|fomc|powell|yield|inflation|cpi|pce|payroll|oil|brent|wti|opec|iran|israel|lebanon|red sea|middle east', re.I)
              for source, url in feeds:
                  try:
                      root = ET.fromstring(fetch(url))
                      for item in root.findall('.//item')[:12]:
                          title = clean(item.findtext('title'), 140)
                          desc = clean(item.findtext('description'), 180)
                          blob = title + ' ' + desc
                          if not keywords.search(blob):
                              continue
                          pub = item.findtext('pubDate') or ''
                          try:
                              dt = email.utils.parsedate_to_datetime(pub).astimezone(timezone.utc)
                              if dt < since:
                                  continue
                          except Exception:
                              pass
                          score = sum(1 for w in ('fed', 'yield', 'inflation', 'cpi', 'oil', 'iran', 'israel', 'gold', 'dollar') if w in blob.lower())
                          out.append({'source': source, 'title': title, 'desc': desc, 'score': score})
                  except Exception as e:
                      print('rss failed', source, e)
              out.sort(key=lambda x: x['score'], reverse=True)
              return out[:6]

          def calendar_items():
              out = []
              try:
                  root = ET.fromstring(fetch('https://nfs.faireconomy.media/ff_calendar_thisweek.xml'))
                  high = re.compile(r'CPI|PCE|Non-Farm|Payroll|Unemployment|FOMC|Fed|Powell|Crude Oil Inventories|GDP|Retail Sales|ISM|PPI', re.I)
                  for ev in root.findall('.//event'):
                      country = clean(ev.findtext('country'), 20)
                      title = clean(ev.findtext('title'), 80)
                      impact = clean(ev.findtext('impact'), 20)
                      date_s = clean(ev.findtext('date'), 30)
                      time_s = clean(ev.findtext('time'), 30)
                      if country == 'USD' and (impact == 'High' or high.search(title)):
                          out.append(f'{date_s} {time_s} - {title}')
              except Exception as e:
                  print('calendar failed', e)
              return out[:5]

          def fmt_market(name, v):
              if not v:
                  return f'<tr><td>{html.escape(name)}</td><td colspan="3">Unavailable</td></tr>'
              unit = '%' if 'yield' in name.lower() or name == 'US 10Y' else ''
              price = f'{v["price"]:.2f}{unit}'
              move = f'{v["change"]:+.2f}{unit}'
              color = '#12805c' if v['change'] >= 0 else '#b42318'
              prev_price = last.get(name, {}).get('price')
              since = 'n/a' if prev_price is None else f'{v["price"] - prev_price:+.2f}{unit}'
              return f'<tr><td>{html.escape(name)}</td><td><b>{price}</b></td><td style="color:{color}">{move}</td><td>{since}</td></tr>'

          news = rss_items()
          cal = calendar_items()
          xau = markets.get('XAUUSD proxy') or {'change': 0}
          dxy = markets.get('USD/DXY') or {'change': 0}
          ten = markets.get('US 10Y') or {'change': 0}
          real = markets.get('10Y real yield') or {'change': 0}
          oil = markets.get('WTI oil') or {'change': 0}
          supportive = (1 if dxy['change'] < 0 else -1) + (1 if ten['change'] < 0 else -1) + (1 if real['change'] < 0 else -1) + (1 if oil['change'] > 0 else 0)
          if supportive >= 2:
              bias = 'XAUUSD supportive'
              reason = 'Softer USD/yields or firmer oil/geopolitical risk lean supportive.'
          elif supportive <= -2:
              bias = 'XAUUSD negative'
              reason = 'Firmer USD/yields lean against gold.'
          else:
              bias = 'XAUUSD mixed'
              reason = 'Drivers are split, so avoid over-reading one headline.'
          invalidation = 'Invalidation: bias changes if DXY and real yields move the opposite way together, or if the next major data point reprices Fed expectations.'
          dist = {'Macro/Fed': 0, 'Energy': 0, 'Geopolitics': 0, 'Other': 0}
          for n in news:
              blob = (n['title'] + ' ' + n['desc']).lower()
              if re.search(r'fed|fomc|powell|yield|inflation|cpi|pce|payroll', blob):
                  dist['Macro/Fed'] += 1
              elif re.search(r'oil|brent|wti|opec|eia', blob):
                  dist['Energy'] += 1
              elif re.search(r'iran|israel|lebanon|red sea|middle east|gaza', blob):
                  dist['Geopolitics'] += 1
              else:
                  dist['Other'] += 1
          chart_url = 'https://quickchart.io/chart?width=500&height=220&c=' + urllib.parse.quote(json.dumps({
              'type': 'bar',
              'data': {'labels': list(dist.keys()), 'datasets': [{'label': 'items', 'data': list(dist.values()), 'backgroundColor': ['#315a7d', '#d18b47', '#8b4f6f', '#7a7f86']}]},
              'options': {'legend': {'display': False}, 'title': {'display': True, 'text': 'Digest mix'}, 'scales': {'yAxes': [{'ticks': {'beginAtZero': True, 'precision': 0}}]}},
          }))
          plain = f'''Market Intelligence Digest - {NOW:%Y-%m-%d %H:%M} Asia/Beirut

          Bias: {bias}. {reason}

          Market snapshot:
          ''' + '\n'.join(f'- {k}: {v["price"]:.2f} ({v["change"]:+.2f})' for k, v in snapshot.items()) + '\n\nTop items:\n' + '\n'.join(f'- {n["title"]}' for n in news[:4]) + '\n\nCalendar risk:\n' + ('\n'.join(f'- {x}' for x in cal) if cal else '- No high-impact USD event found in the free calendar feed.') + f'\n\n{invalidation}\n'
          market_rows = ''.join(fmt_market(k, markets.get(k)) for k in markets)
          news_html = ''.join(f'<li><b>{html.escape(n["source"])}</b>: {html.escape(n["title"])}</li>' for n in news[:4]) or '<li>No major matching headline found.</li>'
          cal_html = ''.join(f'<li>{html.escape(x)}</li>' for x in cal) or '<li>No high-impact USD event found in the free calendar feed.</li>'
          body = f'''<!doctype html><html><body style="margin:0;background:#f6f7f9;font-family:Arial,sans-serif;color:#202124">
          <div style="max-width:720px;margin:0 auto;padding:20px">
          <h2 style="margin:0 0 4px">Market Intelligence Digest</h2>
          <div style="color:#5f6368;margin-bottom:14px">{NOW:%Y-%m-%d %H:%M} Asia/Beirut</div>
          <div style="background:#fff;border:1px solid #dadce0;border-radius:8px;padding:14px;margin-bottom:12px"><b>{bias}</b><br>{reason}<br><br>{invalidation}</div>
          <div style="background:#fff;border:1px solid #dadce0;border-radius:8px;padding:14px;margin-bottom:12px"><b>Live market snapshot</b><table style="width:100%;border-collapse:collapse;margin-top:8px"><tr style="color:#5f6368;text-align:left"><th>Driver</th><th>Now</th><th>Last move</th><th>Since last digest</th></tr>{market_rows}</table></div>
          <div style="background:#fff;border:1px solid #dadce0;border-radius:8px;padding:14px;margin-bottom:12px"><b>What matters now</b><ul>{news_html}</ul><img alt="Digest mix chart" src="{chart_url}" style="max-width:100%;height:auto"></div>
          <div style="background:#fff;border:1px solid #dadce0;border-radius:8px;padding:14px"><b>Calendar risk</b><ul>{cal_html}</ul></div>
          </div></body></html>'''

          slot = slot_to_send()
          if not slot:
              raise SystemExit(0)
          msg = EmailMessage()
          msg['Subject'] = f'Market Intelligence Digest - {NOW:%Y-%m-%d %H:%M} Asia/Beirut'
          msg['From'] = os.environ['SMTP_FROM']
          msg['To'] = ', '.join(RECIPIENTS)
          msg.set_content(plain)
          msg.add_alternative(body, subtype='html')
          with smtplib.SMTP(os.environ['SMTP_HOST'], int(os.environ['SMTP_PORT'])) as smtp:
              smtp.starttls()
              smtp.login(os.environ['SMTP_USERNAME'], os.environ['SMTP_PASSWORD'])
              smtp.send_message(msg)
          try:
              sent = set(json.loads(SENT_PATH.read_text()).get('sent_slots', []))
          except Exception:
              sent = set()
          sent.add(slot)
          SNAPSHOT_PATH.write_text(json.dumps(snapshot, indent=2), encoding='utf-8')
          SENT_PATH.write_text(json.dumps({'sent_slots': sorted(sent)[-30:]}, indent=2), encoding='utf-8')
          print(f'Sent digest to {len(RECIPIENTS)} recipient(s): {", ".join(RECIPIENTS)}')
          PY

      - name: Save digest state
        if: success()
        run: |
          if [ -n "$(git status --porcelain .digest-state)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .digest-state
            git commit -m "Update digest state"
            git push
          else
            echo "No digest state changes."
          fi